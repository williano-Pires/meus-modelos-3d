<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador 3D Profissional</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body style="margin: 0; padding: 20px; background-color: #f4f4f9;">

<div style="text-align: center; font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: auto; border: 1px solid #ddd; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background-color: #ffffff;">
  
  <h1 style="color: #333; font-size: 22px; margin-bottom: 20px;">Gerador de Mockup de Caneca 360°</h1>

  <div id="container-3d" style="position: relative; border-radius: 12px; overflow: hidden; border: 2px solid #eee; background-color: #ffffff; background-image: radial-gradient(circle, #ffffff 0%, #e0e0e0 100%); margin-bottom: 25px;">
    
    <label for="upload-fundo" style="position: absolute; top: 15px; right: 15px; z-index: 10; background-color: rgba(155, 89, 182, 0.9); color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
      🖼️ Alterar Plano de Fundo
    </label>
    <input type="file" id="upload-fundo" accept="image/*" style="display: none;">

    <model-viewer id="cup-viewer" 
      src="texturas.glb" 
      environment-image="https://modelviewer.dev/shared-assets/environments/lightroom_14b.hdr"
      camera-controls 
      interaction-prompt="none"
      shadow-intensity="1" 
      shadow-softness="1"
      exposure="1.3" 
      tone-mapping="commerce"
      camera-orbit="0deg 75deg 105%"
      style="width: 100%; height: 500px; background-color: transparent;">
    </model-viewer>

    <div style="position: absolute; bottom: 15px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10;">
      <button id="btn-screenshot" style="background-color: #3498db; color: white; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; font-size: 14px;">📸 Salvar Foto</button>
      <button id="btn-video" style="background-color: #2ecc71; color: white; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; font-size: 14px;">🎥 Gerar Vídeo 360°</button>
    </div>

    <div id="video-loader" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 20; flex-direction: column; justify-content: center; align-items: center; color: white;">
       <div style="border: 4px solid #f3f3f3; border-top: 4px solid #2ecc71; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px;"></div>
       <span id="timer-text" style="color: #2ecc71; font-size: 24px; font-weight: bold;">8s</span>
    </div>
  </div>

  <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

  <div style="background-color: #fcfcfc; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 20px;">
    <input type="file" id="upload-arte" accept="image/*" style="display: none;">
    <label for="upload-arte" style="background-color: #f39c12; color: white; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">📂 Selecionar Arte</label>
    <div style="height: 220px; margin-top: 15px; background: #eee; border-radius: 5px; overflow: hidden;">
      <img id="crop-target" src="" style="max-width: 100%; display: none;">
    </div>
  </div>

  <div style="display: flex; gap: 8px; flex-wrap: wrap; background: #fff; padding: 12px; border-radius: 10px; border: 1px solid #eee;">
    <div style="flex: 1;"><small>Interno</small><input type="color" id="color-handle" value="#ffffff" style="width: 100%;"></div>
    <div style="flex: 1;"><small>Exterior</small><input type="color" id="color-body" value="#ffffff" style="width: 100%;"></div>
    <div style="flex: 1;"><small>Base</small><input type="color" id="color-base" value="#e0e0e0" style="width: 100%;"></div>
  </div>
</div>

<script>
  // LÓGICA DO SIMULADOR (MESMA DO ANTERIOR, MAS OTIMIZADA)
  const mv = document.querySelector('#cup-viewer');
  const container3d = document.querySelector('#container-3d');
  const videoLoader = document.querySelector('#video-loader');
  const timerText = document.querySelector('#timer-text');
  let cropper = null;
  let currentBgColor = '#ffffff';
  let currentBgImage = null;
  let hasCustomBg = false;

  const toRGB = (h) => [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255, 1];

  // Cores
  document.querySelector('#color-handle').oninput = (e) => { const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_interna")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-body').oninput = (e) => { const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_caneca")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-base').oninput = (e) => { const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_base")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };

  // Arte
  document.querySelector('#upload-arte').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = document.querySelector('#crop-target');
        img.src = event.target.result;
        img.style.display = 'block';
        if (cropper) cropper.destroy();
        cropper = new Cropper(img, { viewMode: 1, autoCropArea: 1, crop() { applyTexture(cropper.getCroppedCanvas().toDataURL()); } });
      };
      reader.readAsDataURL(file);
    }
  };

  async function applyTexture(url) {
    const tex = await mv.createTexture(url);
    const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_arte"));
    if (m && m.pbrMetallicRoughness.baseColorTexture) m.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
  }

  // Gravar Vídeo
  document.querySelector('#btn-video').onclick = () => {
    const mvCanvas = mv.shadowRoot.querySelector('canvas');
    const currentOrbit = mv.getCameraOrbit();
    videoLoader.style.display = 'flex';
    const compCanvas = document.createElement('canvas');
    compCanvas.width = mvCanvas.width; compCanvas.height = mvCanvas.height;
    const ctx = compCanvas.getContext('2d');
    const stream = compCanvas.captureStream(30);
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    const chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'caneca-360.webm'; a.click();
      videoLoader.style.display = 'none';
    };
    recorder.start();
    let start = null;
    function frame(t) {
      if (!start) start = t;
      const progress = t - start;
      mv.cameraOrbit = `${(progress/8000)*360}deg ${currentOrbit.phi}rad ${currentOrbit.radius}m`;
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,compCanvas.width,compCanvas.height);
      ctx.drawImage(mvCanvas, 0,0);
      timerText.innerText = Math.ceil((8000-progress)/1000) + 's';
      if (progress < 8000) requestAnimationFrame(frame); else recorder.stop();
    }
    requestAnimationFrame(frame);
  };
</script>
</body>
</html>
