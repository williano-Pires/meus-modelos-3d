<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Mockup 360° Studio</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
</head>
<body style="margin: 0; padding: 20px; background-color: #f0f2f5; display: flex; justify-content: center;">

<div style="text-align: center; font-family: 'Segoe UI', sans-serif; max-width: 900px; width: 100%; border: 1px solid #ddd; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background-color: #ffffff;">
  
  <h1 style="color: #1a1a1a; font-size: 24px; margin-bottom: 20px;">Gerador de Mockup 360° Studio</h1>

  <div id="wrapper-3d" style="position: relative; width: 100%; aspect-ratio: 16/9; background: #ffffff; border-radius: 15px; overflow: hidden; border: 2px solid #eee; margin-bottom: 25px;">
      
      <label for="upload-fundo" style="position: absolute; top: 15px; right: 15px; z-index: 10; background: rgba(0,0,0,0.7); color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; backdrop-filter: blur(5px);">🖼️ Trocar Fundo</label>
      <input type="file" id="upload-fundo" accept="image/*" style="display: none;">

      <canvas id="bg-canvas" width="1920" height="1080" style="display: none;"></canvas>
      <div id="container-3d" style="width: 100%; height: 100%; position: relative;">
        <model-viewer id="cup-viewer" 
          src="texturas.glb" 
          environment-image="https://modelviewer.dev/shared-assets/environments/lightroom_14b.hdr"
          camera-controls interaction-prompt="none"
          shadow-intensity="1.5" shadow-softness="1" exposure="1.2" tone-mapping="commerce"
          camera-orbit="0deg 75deg 105%"
          style="width: 100%; height: 100%; background-color: transparent;">
        </model-viewer>
      </div>

      <div style="position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10;">
        <button id="btn-screenshot" style="background: #3498db; color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(52,152,219,0.3);">📸 Foto Alta Qualidade</button>
        <button id="btn-video" style="background: #e74c3c; color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(231,76,60,0.3);">🎥 Gerar MP4 Pro (10s)</button>
      </div>

      <div id="loader-tela" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20; flex-direction: column; justify-content: center; align-items: center; color: white;">
         <div style="border: 5px solid #333; border-top: 5px solid #e74c3c; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 15px;"></div>
         <span id="loader-texto" style="font-weight: bold; font-size: 20px; letter-spacing: 1px;">CARREGANDO MOTOR DE VÍDEO...</span>
         <span id="timer-text" style="color: #e74c3c; font-size: 30px; font-weight: bold; margin: 10px 0;">0%</span>
         <small id="loader-detalhe" style="color: #ccc;">Baixando dependências do servidor...</small>
      </div>
  </div>

  <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

  <div style="background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <span style="font-weight: bold; color: #444;">🎨 Sua Arte</span>
      <label for="upload-arte" style="background: #f39c12; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;">📂 Selecionar Imagem</label>
      <input type="file" id="upload-arte" accept="image/*" style="display: none;">
    </div>
    <div style="height: 200px; background: #e9ecef; border-radius: 10px; overflow: hidden; border: 2px dashed #cbd5e0; display: flex; align-items: center; justify-content: center;">
      <img id="crop-target" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='800' height='400' style='background:%23e9ecef'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='20' fill='%23888'%3EAguardando Sua Arte...%3C/text%3E%3C/svg%3E" style="max-width: 100%; max-height: 100%;">
    </div>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
      <button onclick="if(cropper) cropper.zoom(0.1)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff;">🔍 +</button>
      <button onclick="if(cropper) cropper.zoom(-0.1)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff;">🔎 -</button>
      <button onclick="if(cropper) cropper.rotate(90)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff;">🔄 Girar</button>
      <button onclick="if(cropper) cropper.reset()" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff; color: #e74c3c;">⏮️ Reset</button>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px;">
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;">
      <small style="display:block; margin-bottom:5px; color:#555; font-weight:bold;">Interno/Alça</small>
      <input type="color" id="color-handle" value="#ffffff" style="width: 100%; height: 35px; padding: 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;">
    </div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;">
      <small style="display:block; margin-bottom:5px; color:#555; font-weight:bold;">Cor Caneca</small>
      <input type="color" id="color-body" value="#ffffff" style="width: 100%; height: 35px; padding: 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;">
    </div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;">
      <small style="display:block; margin-bottom:5px; color:#555; font-weight:bold;">Fundo Arte</small>
      <input type="color" id="color-stamp" value="#ffffff" style="width: 100%; height: 35px; padding: 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;">
    </div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;">
      <small style="display:block; margin-bottom:5px; color:#555; font-weight:bold;">Base Apoio</small>
      <input type="color" id="color-base" value="#e0e0e0" style="width: 100%; height: 35px; padding: 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;">
    </div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 2px solid #3498db;">
      <small style="display:block; margin-bottom:5px; color:#3498db; font-weight:bold;">Cor Cenário</small>
      <input type="color" id="color-bg" value="#ffffff" style="width: 100%; height: 35px; padding: 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;">
    </div>
  </div>

  <label style="background: #2c3e50; color: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;">
      <input type="checkbox" id="metalic-toggle" style="width: 20px; height: 20px;"> ✨ ATIVAR EFEITO METALIZADO
  </label>
</div>

<script>
  // O ffmpeg inicia vazio para NÃO quebrar a página ao carregar
  let ffmpeg = null;

  const mv = document.querySelector('#cup-viewer');
  const loaderTela = document.querySelector('#loader-tela');
  const loaderTexto = document.querySelector('#loader-texto');
  const timerText = document.querySelector('#timer-text');
  const loaderDetalhe = document.querySelector('#loader-detalhe');
  let cropper = null;

  let currentBgColor = '#ffffff';
  let currentBgImage = null;
  let hasCustomBg = false;

  const toRGB = (h) => [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255, 1];

  // ==========================================
  // LÓGICA DE CORES (AGORA PROTEGIDA E FUNCIONAL)
  // ==========================================
  document.querySelector('#color-handle').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_interna")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-body').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_caneca")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-stamp').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_arte")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-base').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_base")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  
  document.querySelector('#color-bg').oninput = (e) => {
    hasCustomBg = true;
    currentBgColor = e.target.value;
    currentBgImage = null;
    document.querySelector('#container-3d').style.backgroundImage = 'none';
    document.querySelector('#container-3d').style.backgroundColor = currentBgColor;
  };
  
  document.querySelector('#upload-fundo').onchange = (e) => {
    const file = e.target.files[0];
    if(file) { 
      hasCustomBg = true;
      const url = URL.createObjectURL(file);
      document.querySelector('#container-3d').style.backgroundImage = `url(${url})`; 
      document.querySelector('#container-3d').style.backgroundSize = 'cover'; 
      document.querySelector('#container-3d').style.backgroundPosition = 'center';
      const img = new Image(); img.onload = () => { currentBgImage = img; }; img.src = url;
    }
  };

  document.querySelector('#metalic-toggle').onchange = (e) => {
    if(!mv.model) return;
    mv.model.materials.forEach(m => {
      if(!m.name.toLowerCase().includes("cor_base")) {
        m.pbrMetallicRoughness.setMetallicFactor(e.target.checked ? 1 : 0.1);
        m.pbrMetallicRoughness.setRoughnessFactor(e.target.checked ? 0.05 : 0.4);
      }
    });
  };

  // ==========================================
  // ARTE DA CANECA
  // ==========================================
  document.querySelector('#upload-arte').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = document.querySelector('#crop-target');
        img.src = event.target.result;
        if (cropper) cropper.destroy();
        cropper = new Cropper(img, { viewMode: 1, autoCropArea: 1, crop() { applyTexture(cropper.getCroppedCanvas().toDataURL()); } });
      };
      reader.readAsDataURL(file);
    }
  };

  async function applyTexture(url) {
    if (!mv.model) return;
    const tex = await mv.createTexture(url);
    const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_arte"));
    if (m && m.pbrMetallicRoughness.baseColorTexture) {
      m.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
      m.pbrMetallicRoughness.baseColorTexture.texture.transform = {scale:{u:1,v:1}, offset:{u:0,v:0}};
    }
  }

  function drawFrame(ctx, width, height, modelCanvas) {
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.clearRect(0, 0, width, height);

    if (hasCustomBg) {
      if (currentBgImage) {
        const scale = Math.max(width / currentBgImage.width, height / currentBgImage.height);
        const w = currentBgImage.width * scale;
        const h = currentBgImage.height * scale;
        ctx.drawImage(currentBgImage, (width - w) / 2, (height - h) / 2, w, h);
      } else {
        ctx.fillStyle = currentBgColor;
        ctx.fillRect(0, 0, width, height);
      }
    } else {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);
    }

    if (modelCanvas) {
        const scale3D = Math.min(width / modelCanvas.width, height / modelCanvas.height);
        const w = modelCanvas.width * scale3D;
        const h = modelCanvas.height * scale3D;
        ctx.drawImage(modelCanvas, (width - w) / 2, (height - h) / 2, w, h);
    }
  }

  // ==========================================
  // EXPORTAÇÃO DA FOTO
  // ==========================================
  document.querySelector('#btn-screenshot').onclick = async () => {
    if(!mv.model) return;
    const blob = await mv.toBlob({ idealAspect: true });
    const imgUrl = URL.createObjectURL(blob);
    const img = new Image();
    
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 1920; canvas.height = 1080;
      drawFrame(canvas.getContext('2d'), 1920, 1080, img);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png', 1.0);
      a.download = 'mockup-foto.png';
      a.click();
      URL.revokeObjectURL(imgUrl);
    };
    img.src = imgUrl;
  };

  // ==========================================
  // EXPORTAÇÃO DO VÍDEO MP4 (VIA FFMPEG)
  // ==========================================
  document.querySelector('#btn-video').onclick = async () => {
    const webglCanvas = mv.shadowRoot.querySelector('canvas');
    if (!webglCanvas || !mv.model) return;

    loaderTela.style.display = 'flex';
    
    // SÓ CARREGA O FFMPEG QUANDO CLICA, PROTEGENDO A PÁGINA
    if (!ffmpeg) {
        loaderTexto.innerText = "BAIXANDO MOTOR DE VÍDEO...";
        loaderDetalhe.innerText = "Por favor, aguarde o carregamento (1ª vez demora um pouco).";
        
        try {
            // Puxa o FFmpeg da janela com segurança
            const { FFmpeg } = window.FFmpeg;
            ffmpeg = new FFmpeg();
            ffmpeg.on('log', ({ message }) => console.log(message));
            
            await ffmpeg.load({
                coreURL: "https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js",
            });
        } catch (error) {
            console.error(error);
            alert("ERRO: O navegador bloqueou o carregamento do vídeo. Recarregue a página e tente novamente.");
            loaderTela.style.display = 'none';
            return;
        }
    }

    loaderTexto.innerText = "CRIANDO QUADROS DA ANIMAÇÃO...";
    loaderDetalhe.innerText = "Processando em Full HD...";
    
    const orbit = mv.getCameraOrbit();
    const startTheta = orbit.theta * (180 / Math.PI); 
    const startPhi = orbit.phi;
    const startRadius = orbit.radius;

    const canvas = document.createElement('canvas');
    canvas.width = 1920; 
    canvas.height = 1080;
    const ctx = canvas.getContext('2d');

    const fps = 30;
    const duration = 10; 
    const totalFrames = fps * duration;
    
    for (let i = 1; i <= totalFrames; i++) {
        const progress = i / totalFrames;
        const currentAngle = startTheta + (progress * 360);
        
        mv.cameraOrbit = `${currentAngle}deg ${startPhi}rad ${startRadius}m`;
        mv.jumpCameraToGoal();

        await new Promise(r => setTimeout(r, 30));

        drawFrame(ctx, 1920, 1080, webglCanvas);

        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
        const res = await fetch(dataUrl);
        const buffer = await res.arrayBuffer();
        const frameData = new Uint8Array(buffer);
        
        const frameName = `frame_${String(i).padStart(3, '0')}.jpg`;
        await ffmpeg.writeFile(frameName, frameData);

        timerText.innerText = Math.round((i / totalFrames) * 100) + '%';
        loaderDetalhe.innerText = `Processando quadro ${i} de ${totalFrames}`;
    }

    loaderTexto.innerText = "COMPILANDO ARQUIVO MP4...";
    loaderDetalhe.innerText = "Costurando o vídeo em alta qualidade...";
    timerText.innerText = "⏳";

    await ffmpeg.exec([
        '-framerate', '30', 
        '-pattern_type', 'sequence', 
        '-i', 'frame_%03d.jpg', 
        '-c:v', 'libx264', 
        '-pix_fmt', 'yuv420p', 
        'output.mp4'
    ]);

    const videoData = await ffmpeg.readFile('output.mp4');
    const blob = new Blob([videoData.buffer], { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = `mockup-premium-10s.mp4`; 
    a.click();
    URL.revokeObjectURL(url);

    for (let i = 1; i <= totalFrames; i++) {
        await ffmpeg.deleteFile(`frame_${String(i).padStart(3, '0')}.jpg`);
    }
    await ffmpeg.deleteFile('output.mp4');

    mv.cameraOrbit = `${startTheta}deg ${startPhi}rad ${startRadius}m`;
    mv.jumpCameraToGoal();
    loaderTela.style.display = 'none';
  };
</script>
</body>
</html>
