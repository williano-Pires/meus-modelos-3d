<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estúdio de Mockup 3D Premium</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body style="margin: 0; padding: 20px; background-color: #f0f2f5; display: flex; justify-content: center;">

<div style="text-align: center; font-family: 'Segoe UI', sans-serif; max-width: 900px; width: 100%; border: 1px solid #ddd; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background-color: #ffffff;">
  
  <h1 style="color: #1a1a1a; font-size: 24px; margin-bottom: 20px;">Gerador de Mockup 360° Studio</h1>

  <div id="wrapper-3d" style="position: relative; width: 100%; aspect-ratio: 16/9; background: #ffffff; border-radius: 15px; overflow: hidden; border: 2px solid #eee; margin-bottom: 25px;">
      
      <label for="upload-fundo" style="position: absolute; top: 15px; right: 15px; z-index: 20; background: rgba(0,0,0,0.7); color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; backdrop-filter: blur(5px);">
        🖼️ Trocar Fundo
      </label>
      <input type="file" id="upload-fundo" accept="image/*" style="display: none;">

      <div id="render-stage" style="width: 1920px; height: 1080px; position: absolute; top: 0; left: 0; transform-origin: top left;">
        
        <canvas id="bg-canvas" width="1920" height="1080" style="position: absolute; top: 0; left: 0; z-index: 1;"></canvas>
        
        <model-viewer id="cup-viewer" 
          src="texturas.glb" 
          environment-image="https://modelviewer.dev/shared-assets/environments/lightroom_14b.hdr"
          camera-controls 
          interaction-prompt="none"
          shadow-intensity="1.5" 
          shadow-softness="1"
          exposure="1.2" 
          tone-mapping="commerce"
          camera-orbit="0deg 75deg 105%"
          style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; background-color: transparent;">
        </model-viewer>

      </div>

      <div style="position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 20;">
        <button id="btn-screenshot" style="background: #3498db; color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(52,152,219,0.3);">📸 Gerar Foto 1080p</button>
        <button id="btn-video" style="background: #2ecc71; color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(46,204,113,0.3);">🎥 Gravar Vídeo (10s)</button>
      </div>

      <div id="loader-tela" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 30; flex-direction: column; justify-content: center; align-items: center; color: white;">
         <div style="border: 5px solid #333; border-top: 5px solid #2ecc71; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 15px;"></div>
         <span style="font-weight: bold; font-size: 20px; letter-spacing: 1px;">GRAVANDO VÍDEO...</span>
         <span id="timer-text" style="color: #2ecc71; font-size: 30px; font-weight: bold; margin: 10px 0;">10s</span>
      </div>
  </div>

  <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

  <div style="background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <span style="font-weight: bold; color: #444;">🎨 Sua Arte</span>
      <label for="upload-arte" style="background: #f39c12; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;">📂 Selecionar Imagem</label>
      <input type="file" id="upload-arte" accept="image/*" style="display: none;">
    </div>
    <div style="height: 200px; background: #e9ecef; border-radius: 10px; overflow: hidden; border: 2px dashed #cbd5e0; display: flex; align-items: center; justify-content: center;">
      <img id="crop-target" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='800' height='400' style='background:%23e9ecef'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='24' fill='%23888'%3EAguardando Sua Arte...%3C/text%3E%3C/svg%3E" style="max-width: 100%; max-height: 100%;">
    </div>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
      <button onclick="if(cropper) cropper.zoom(0.1)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff;">🔍 +</button>
      <button onclick="if(cropper) cropper.zoom(-0.1)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff;">🔎 -</button>
      <button onclick="if(cropper) cropper.rotate(90)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff;">🔄 Girar</button>
      <button onclick="if(cropper) cropper.reset()" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff; color: #e74c3c;">⏮️ Reset</button>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px;">
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small>Interno/Alça</small><input type="color" id="color-handle" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small>Cor Caneca</small><input type="color" id="color-body" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small>Fundo Arte</small><input type="color" id="color-stamp" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small>Base Apoio</small><input type="color" id="color-base" value="#e0e0e0" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 2px solid #3498db;"><small style="color: #3498db; font-weight: bold;">Cor Cenário</small><input type="color" id="color-bg" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
  </div>

  <label style="background: #2c3e50; color: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;">
      <input type="checkbox" id="metalic-toggle" style="width: 20px; height: 20px;"> ✨ ATIVAR EFEITO METALIZADO
  </label>
</div>

<script>
  // ==========================================
  // 1. AJUSTE DE TELA (O Segredo do Full HD sem perder layout)
  // ==========================================
  function resizeStage() {
      const wrapper = document.getElementById('wrapper-3d');
      const stage = document.getElementById('render-stage');
      const scale = wrapper.clientWidth / 1920;
      stage.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', resizeStage);
  resizeStage(); // Ajusta na inicialização

  const mv = document.querySelector('#cup-viewer');
  const loaderTela = document.querySelector('#loader-tela');
  const timerText = document.querySelector('#timer-text');
  let cropper = null;

  let currentBgColor = '#ffffff';
  let currentBgImage = null;
  let hasCustomBg = false;

  const toRGB = (h) => [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255, 1];

  // ==========================================
  // 2. ATUALIZADOR DO FUNDO (Pinta o canvas por trás do 3D)
  // ==========================================
  function updateBackground() {
      const bgCtx = document.getElementById('bg-canvas').getContext('2d');
      bgCtx.imageSmoothingEnabled = true;
      bgCtx.imageSmoothingQuality = 'high';
      bgCtx.clearRect(0,0,1920,1080);
      
      if (hasCustomBg) {
          if (currentBgImage) {
              const scale = Math.max(1920 / currentBgImage.width, 1080 / currentBgImage.height);
              const w = currentBgImage.width * scale;
              const h = currentBgImage.height * scale;
              bgCtx.drawImage(currentBgImage, (1920 - w)/2, (1080 - h)/2, w, h);
          } else {
              bgCtx.fillStyle = currentBgColor;
              bgCtx.fillRect(0,0,1920,1080);
          }
      } else {
          const grad = bgCtx.createRadialGradient(960, 540, 0, 960, 540, 960);
          grad.addColorStop(0, '#ffffff');
          grad.addColorStop(1, '#e0e0e0');
          bgCtx.fillStyle = grad;
          bgCtx.fillRect(0,0,1920,1080);
      }
  }
  // Aplica o fundo inicial
  updateBackground();

  // ==========================================
  // 3. CONTROLES (Cores, Fundo e Efeitos)
  // ==========================================
  document.querySelector('#color-handle').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_interna")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-body').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_caneca")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-stamp').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_arte")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-base').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_base")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  
  document.querySelector('#color-bg').oninput = (e) => {
    hasCustomBg = true;
    currentBgColor = e.target.value;
    currentBgImage = null;
    updateBackground();
  };
  
  document.querySelector('#upload-fundo').onchange = (e) => {
    const file = e.target.files[0];
    if(file) { 
      hasCustomBg = true;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => { currentBgImage = img; updateBackground(); };
      img.src = url;
    }
  };

  document.querySelector('#metalic-toggle').onchange = (e) => {
    if(!mv.model) return;
    mv.model.materials.forEach(m => {
      if(!m.name.toLowerCase().includes("cor_base")) {
        m.pbrMetallicRoughness.setMetallicFactor(e.target.checked ? 1 : 0.1);
        m.pbrMetallicRoughness.setRoughnessFactor(e.target.checked ? 0.05 : 0.4);
      }
    });
  };

  // ==========================================
  // 4. CROPPER E TEXTURA
  // ==========================================
  document.querySelector('#upload-arte').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = document.querySelector('#crop-target');
        img.src = event.target.result;
        if (cropper) cropper.destroy();
        cropper = new Cropper(img, { viewMode: 1, autoCropArea: 1, crop() { applyTexture(cropper.getCroppedCanvas().toDataURL()); } });
      };
      reader.readAsDataURL(file);
    }
  };

  async function applyTexture(url) {
    if (!mv.model) return;
    const tex = await mv.createTexture(url);
    const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_arte"));
    if (m && m.pbrMetallicRoughness.baseColorTexture) {
      m.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
      // GARANTIA: Impede a imagem de bagunçar ou repetir
      m.pbrMetallicRoughness.baseColorTexture.texture.transform = {scale:{u:1,v:1}, offset:{u:0,v:0}};
    }
  }

  // ==========================================
  // 5. FOTO INSTANTÂNEA E PERFEITA (1080p Real)
  // ==========================================
  document.querySelector('#btn-screenshot').onclick = () => {
    if(!mv.model) return;
    
    // Cria um canvas em branco
    const captureCanvas = document.createElement('canvas');
    captureCanvas.width = 1920; 
    captureCanvas.height = 1080;
    const ctx = captureCanvas.getContext('2d');
    
    // Cola o cenário 1920x1080
    ctx.drawImage(document.getElementById('bg-canvas'), 0, 0);
    
    // Puxa a caneca 3D (Que já está em 1920x1080 nativamente) e cola por cima
    const webglCanvas = mv.shadowRoot.querySelector('canvas');
    if(webglCanvas) ctx.drawImage(webglCanvas, 0, 0, 1920, 1080);
    
    // Baixa o arquivo instantaneamente
    const a = document.createElement('a');
    a.href = captureCanvas.toDataURL('image/png', 1.0);
    a.download = 'mockup-foto.png';
    a.click();
  };

  // ==========================================
  // 6. VÍDEO BLINDADO E NATIVO (Sem Bibliotecas Externas)
  // ==========================================
  document.querySelector('#btn-video').onclick = async () => {
    const webglCanvas = mv.shadowRoot.querySelector('canvas');
    if (!webglCanvas) return;

    loaderTela.style.display = 'flex';
    
    const orbit = mv.getCameraOrbit();
    const startTheta = orbit.theta * (180 / Math.PI); 
    const startPhi = orbit.phi;
    const startRadius = orbit.radius;

    const oldDecay = mv.interpolationDecay;
    mv.interpolationDecay = 0; // Trava a câmera

    // Prepara o palco de gravação
    const captureCanvas = document.createElement('canvas');
    captureCanvas.width = 1920; 
    captureCanvas.height = 1080;
    const ctx = captureCanvas.getContext('2d');
    const bgCanvas = document.getElementById('bg-canvas');

    // Abre o gravador
    const stream = captureCanvas.captureStream(30); // 30 FPS
    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 10000000 });
    const chunks = [];

    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      isRecording = false; // Desliga o espião da GPU
      mv.removeEventListener('render', onRender); // Remove o espião
      
      const blob = new Blob(chunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `mockup-360-10s.webm`; 
      a.click();
      URL.revokeObjectURL(url);
      
      mv.interpolationDecay = oldDecay;
      mv.cameraOrbit = `${startTheta}deg ${startPhi}rad ${startRadius}m`;
      mv.jumpCameraToGoal();
      loaderTela.style.display = 'none';
    };

    // O "ESPIÃO": Sempre que a Placa de Vídeo gerar um quadro, nós copiamos pro vídeo
    // Isso garante 100% que o vídeo NUNCA vai ficar estático!
    let isRecording = true;
    function onRender() {
        if(!isRecording) return;
        ctx.clearRect(0,0,1920,1080);
        ctx.drawImage(bgCanvas, 0, 0); // Pinta o fundo
        ctx.drawImage(webglCanvas, 0, 0, 1920, 1080); // Pinta a caneca
    }
    mv.addEventListener('render', onRender);

    recorder.start();

    // Motor de giro
    const duration = 10000; 
    const startTime = performance.now();

    function tick(time) {
      let progress = (time - startTime) / duration;
      
      if (progress >= 1) {
        recorder.stop();
        return;
      }

      // Gira a caneca (Isso automaticamente ativa o onRender)
      const currentAngle = startTheta + (progress * 360);
      mv.cameraOrbit = `${currentAngle}deg ${startPhi}rad ${startRadius}m`;
      mv.jumpCameraToGoal();

      timerText.innerText = Math.ceil(10 - (progress * 10)) + 's';
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  };
</script>
</body>
</html>
