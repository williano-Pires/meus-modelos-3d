<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Mockup 3D Premium</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/whammy/0.2.0/whammy.min.js"></script>
</head>
<body style="margin: 0; padding: 20px; background-color: #f0f2f5; display: flex; justify-content: center;">

<div style="text-align: center; font-family: 'Segoe UI', sans-serif; max-width: 900px; width: 100%; border: 1px solid #ddd; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background-color: #ffffff;">
  
  <h1 style="color: #1a1a1a; font-size: 24px; margin-bottom: 20px;">Gerador de Mockup 360° Studio (Full HD)</h1>

  <div id="container-3d" style="position: relative; border-radius: 15px; overflow: hidden; border: 2px solid #eee; background: #ffffff; margin-bottom: 25px; width: 100%; aspect-ratio: 16 / 9;">
    
    <label for="upload-fundo" style="position: absolute; top: 15px; right: 15px; z-index: 10; background: rgba(0,0,0,0.7); color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; backdrop-filter: blur(5px);">
      🖼️ Trocar Fundo do Cenário
    </label>
    <input type="file" id="upload-fundo" accept="image/*" style="display: none;">

    <model-viewer id="cup-viewer" 
      src="texturas.glb" 
      environment-image="https://modelviewer.dev/shared-assets/environments/lightroom_14b.hdr"
      camera-controls 
      interaction-prompt="none"
      shadow-intensity="1.5" 
      shadow-softness="1"
      exposure="1.2" 
      tone-mapping="commerce"
      camera-orbit="0deg 75deg 105%"
      style="width: 100%; height: 100%; background-color: transparent;">
    </model-viewer>

    <div style="position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10;">
      <button id="btn-screenshot" style="background: #3498db; color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(52,152,219,0.3);">📸 Foto Ultra HD</button>
      <button id="btn-video" style="background: #2ecc71; color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(46,204,113,0.3);">🎥 Vídeo 360° Offline (7s)</button>
    </div>

    <div id="video-loader" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20; flex-direction: column; justify-content: center; align-items: center; color: white;">
       <div style="border: 5px solid #333; border-top: 5px solid #2ecc71; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 15px;"></div>
       <span id="loader-title" style="font-weight: bold; font-size: 20px; letter-spacing: 1px;">PREPARANDO ESTÚDIO FULL HD...</span>
       <span id="timer-text" style="color: #2ecc71; font-size: 30px; font-weight: bold; margin: 10px 0;">0%</span>
       <small style="color: #888;">Renderização quadro a quadro. Isso pode levar alguns segundos.</small>
    </div>
  </div>

  <style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>

  <div style="background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <span style="font-weight: bold; color: #444;">🎨 Sua Arte</span>
      <label for="upload-arte" style="background: #f39c12; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px;">📂 Selecionar Imagem</label>
      <input type="file" id="upload-arte" accept="image/*" style="display: none;">
    </div>
    <div style="height: 200px; background: #e9ecef; border-radius: 10px; overflow: hidden; border: 2px dashed #cbd5e0; display: flex; align-items: center; justify-content: center;">
      <img id="crop-target" src="https://via.placeholder.com/800x400?text=Sua+Arte+Aqui" style="max-width: 100%; max-height: 100%;">
    </div>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
      <button onclick="if(cropper) cropper.zoom(0.1)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff;">🔍 +</button>
      <button onclick="if(cropper) cropper.zoom(-0.1)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff;">🔎 -</button>
      <button onclick="if(cropper) cropper.rotate(90)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff;">🔄 Girar</button>
      <button onclick="if(cropper) cropper.reset()" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff; color: #e74c3c;">⏮️ Reset</button>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px;">
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small>Interno/Alça</small><input type="color" id="color-handle" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small>Cor Caneca</small><input type="color" id="color-body" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small>Fundo Arte</small><input type="color" id="color-stamp" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small>Base Apoio</small><input type="color" id="color-base" value="#e0e0e0" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 2px solid #3498db;"><small style="color: #3498db; font-weight: bold;">Cor Cenário</small><input type="color" id="color-bg" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none;"></div>
  </div>

  <label style="background: #2c3e50; color: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; font-weight: bold; transition: 0.3s;">
      <input type="checkbox" id="metalic-toggle" style="width: 20px; height: 20px;"> ✨ ATIVAR EFEITO METALIZADO DE LUXO
  </label>
</div>

<script>
  const mv = document.querySelector('#cup-viewer');
  const container3d = document.querySelector('#container-3d');
  const videoLoader = document.querySelector('#video-loader');
  const loaderTitle = document.querySelector('#loader-title');
  const timerText = document.querySelector('#timer-text');
  let cropper = null;

  let currentBgColor = '#ffffff';
  let currentBgImage = null;
  let hasCustomBg = false;

  const toRGB = (h) => [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255, 1];

  // =====================================
  // GERENCIAMENTO DE CORES (Corrigido)
  // =====================================
  document.querySelector('#color-handle').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_interna")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-body').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_caneca")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-stamp').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_arte")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  document.querySelector('#color-base').oninput = (e) => { const m = mv.model?.materials.find(mat => mat.name.toLowerCase().includes("cor_base")); if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); };
  
  // Aqui está a correção do Cenário, atualizando a tela na hora
  document.querySelector('#color-bg').oninput = (e) => {
    hasCustomBg = true;
    currentBgColor = e.target.value;
    currentBgImage = null;
    container3d.style.backgroundImage = 'none';
    container3d.style.backgroundColor = currentBgColor;
  };
  
  document.querySelector('#upload-fundo').onchange = (e) => {
    const file = e.target.files[0];
    if(file) { 
      hasCustomBg = true;
      const url = URL.createObjectURL(file);
      container3d.style.backgroundImage = `url(${url})`; 
      container3d.style.backgroundSize = 'cover'; 
      container3d.style.backgroundPosition = 'center';
      const img = new Image();
      img.src = url;
      img.onload = () => { currentBgImage = img; };
    }
  };

  document.querySelector('#metalic-toggle').onchange = (e) => {
    if(!mv.model) return;
    mv.model.materials.forEach(m => {
      if(!m.name.toLowerCase().includes("cor_base")) {
        m.pbrMetallicRoughness.setMetallicFactor(e.target.checked ? 1 : 0.1);
        m.pbrMetallicRoughness.setRoughnessFactor(e.target.checked ? 0.05 : 0.4);
      }
    });
  };

  // =====================================
  // CROPPER E TEXTURA
  // =====================================
  document.querySelector('#upload-arte').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = document.querySelector('#crop-target');
        img.src = event.target.result;
        if (cropper) cropper.destroy();
        cropper = new Cropper(img, { viewMode: 1, autoCropArea: 1, crop() { applyTexture(cropper.getCroppedCanvas().toDataURL()); } });
      };
      reader.readAsDataURL(file);
    }
  };

  async function applyTexture(url) {
    if (!mv.model) return;
    const tex = await mv.createTexture(url);
    const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_arte"));
    if (m && m.pbrMetallicRoughness.baseColorTexture) {
      m.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
      // Mantém a estampa ajustada sem repetir
      m.pbrMetallicRoughness.baseColorTexture.texture.transform = {scale:{u:1,v:1}, offset:{u:0,v:0}};
    }
  }

  // =====================================
  // MOTOR DE DESENHO E COMPOSIÇÃO FULL HD
  // =====================================
  function drawComposite(ctx, width, height, sourceCanvas) {
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.clearRect(0, 0, width, height);

    // Aplica o cenário na resolução máxima
    if (hasCustomBg) {
      if (currentBgImage) {
        const scale = Math.max(width / currentBgImage.width, height / currentBgImage.height);
        const drawW = currentBgImage.width * scale;
        const drawH = currentBgImage.height * scale;
        ctx.drawImage(currentBgImage, (width - drawW) / 2, (height - drawH) / 2, drawW, drawH);
      } else {
        ctx.fillStyle = currentBgColor;
        ctx.fillRect(0, 0, width, height);
      }
    } else {
      const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width/2);
      gradient.addColorStop(0, "#ffffff");
      gradient.addColorStop(1, "#e0e0e0");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    // Carimba o Modelo 3D perfeitamente centralizado
    if (sourceCanvas) {
      const srcW = sourceCanvas.width;
      const srcH = sourceCanvas.height;
      const scale3D = Math.min(width / srcW, height / srcH);
      const drawW = srcW * scale3D;
      const drawH = srcH * scale3D;
      ctx.drawImage(sourceCanvas, (width - drawW) / 2, (height - drawH) / 2, drawW, drawH);
    }
  }

  // =====================================
  // BOTÃO: FOTO ULTRA HD
  // =====================================
  document.querySelector('#btn-screenshot').onclick = async () => {
    videoLoader.style.display = 'flex';
    loaderTitle.innerText = "CAPTURANDO FOTO ULTRA HD...";
    timerText.innerText = "⏳";

    // O "Truque do Estúdio": Força a caneca a renderizar em 1920x1080 escondida
    const oldPosition = mv.style.position;
    mv.style.position = 'absolute';
    mv.style.width = '1920px';
    mv.style.height = '1080px';
    
    // Dá 500ms de calma para a placa de vídeo carregar a super resolução
    await new Promise(r => setTimeout(r, 500)); 

    const webglCanvas = mv.shadowRoot.querySelector('canvas');
    const photoCanvas = document.createElement('canvas');
    photoCanvas.width = 1920; 
    photoCanvas.height = 1080;
    
    drawComposite(photoCanvas.getContext('2d'), photoCanvas.width, photoCanvas.height, webglCanvas);
    
    const a = document.createElement('a');
    a.href = photoCanvas.toDataURL('image/png', 1.0);
    a.download = 'mockup-foto-HD.png';
    a.click();

    // Devolve o estúdio ao normal
    mv.style.width = '100%';
    mv.style.height = '100%';
    mv.style.position = oldPosition;
    videoLoader.style.display = 'none';
  };

  // =====================================
  // BOTÃO: VÍDEO 360° OFFLINE (Motor Whammy - O Definitivo)
  // =====================================
  document.querySelector('#btn-video').onclick = async () => {
    if (!mv.model) return;

    videoLoader.style.display = 'flex';
    loaderTitle.innerText = "RENDERIZANDO VÍDEO (7s)...";
    timerText.innerText = "0%";
    
    // Grava de onde o usuário parou
    const orbit = mv.getCameraOrbit();
    const startTheta = orbit.theta * (180 / Math.PI); 
    const startPhi = orbit.phi;
    const startRadius = orbit.radius;

    const oldDecay = mv.interpolationDecay;
    mv.interpolationDecay = 0; 

    // Força a caneca a renderizar gigante
    const oldPosition = mv.style.position;
    mv.style.position = 'absolute';
    mv.style.width = '1920px';
    mv.style.height = '1080px';

    // Respira
    await new Promise(r => setTimeout(r, 500));

    // Configura o compilador de vídeo e o Canvas
    const canvas = document.createElement('canvas');
    canvas.width = 1920; 
    canvas.height = 1080;
    const ctx = canvas.getContext('2d');

    const videoEncoder = new Whammy.Video(30); // 30 FPS garantidos

    const duration = 7; // 7 Segundos exatos
    const totalFrames = duration * 30; // 210 quadros

    // Loop com calma (Offline Render)
    for (let i = 0; i <= totalFrames; i++) {
        const progress = i / totalFrames;
        
        // Posição atual da câmera
        const currentAngle = startTheta + (progress * 360);
        mv.cameraOrbit = `${currentAngle}deg ${startPhi}rad ${startRadius}m`;
        mv.jumpCameraToGoal();

        // ESPERA A PLACA DE VÍDEO DESENHAR (O segredo da renderização offline)
        await new Promise(r => setTimeout(r, 50)); 

        const webglCanvas = mv.shadowRoot.querySelector('canvas');
        drawComposite(ctx, canvas.width, canvas.height, webglCanvas);

        // Adiciona a foto perfeita no vídeo
        videoEncoder.add(ctx);

        // Mostra a porcentagem real pro usuário
        timerText.innerText = Math.round(progress * 100) + '%';
    }

    loaderTitle.innerText = "COMPILANDO ARQUIVO DE VÍDEO...";
    timerText.innerText = "⏳";

    // Compila e entrega o vídeo
    videoEncoder.compile(false, function(output) {
        const url = URL.createObjectURL(output);
        const a = document.createElement('a');
        a.href = url;
        
        // Whammy gera WebM (O formato web padrão de mais alta qualidade)
        a.download = `mockup-360-7s.webm`; 
        a.click();
        URL.revokeObjectURL(url);

        // Devolve o sistema pro estado original
        mv.style.width = '100%';
        mv.style.height = '100%';
        mv.style.position = oldPosition;
        mv.interpolationDecay = oldDecay;
        mv.cameraOrbit = `${startTheta}deg ${startPhi}rad ${startRadius}m`;
        mv.jumpCameraToGoal();

        videoLoader.style.display = 'none';
    });
  };
</script>
</body>
</html>
