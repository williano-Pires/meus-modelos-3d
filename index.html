<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Mockup 3D Premium</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body style="margin: 0; padding: 20px; background-color: #f0f2f5; display: flex; justify-content: center;">

<div style="text-align: center; font-family: 'Segoe UI', sans-serif; max-width: 900px; width: 100%; border: 1px solid #ddd; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background-color: #ffffff;">
  
  <h1 style="color: #1a1a1a; font-size: 24px; margin-bottom: 20px;">Estúdio de Mockup 360° Full HD</h1>

  <div id="container-3d" style="position: relative; border-radius: 15px; overflow: hidden; border: 2px solid #eee; background: #ffffff; margin-bottom: 25px; width: 100%; aspect-ratio: 16 / 9;">
    
    <label for="upload-fundo" style="position: absolute; top: 15px; right: 15px; z-index: 10; background: rgba(0,0,0,0.7); color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);">
      🖼️ Trocar Fundo do Cenário
    </label>
    <input type="file" id="upload-fundo" accept="image/*" style="display: none;">

    <model-viewer id="cup-viewer" 
      src="texturas.glb" 
      environment-image="https://modelviewer.dev/shared-assets/environments/lightroom_14b.hdr"
      camera-controls 
      interaction-prompt="none"
      shadow-intensity="1.5" 
      shadow-softness="1"
      exposure="1.2" 
      tone-mapping="commerce"
      camera-orbit="0deg 75deg 105%"
      style="width: 100%; height: 100%; background-color: transparent;">
    </model-viewer>

    <div style="position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10;">
      <button id="btn-screenshot" style="background: #3498db; color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(52,152,219,0.3); transition: 0.2s;">📸 Gerar Foto Ultra HD</button>
      <button id="btn-video" style="background: #2ecc71; color: white; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(46,204,113,0.3); transition: 0.2s;">🎥 Gerar Vídeo 360° (15s)</button>
    </div>

    <div id="video-loader" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20; flex-direction: column; justify-content: center; align-items: center; color: white;">
       <div style="border: 5px solid #333; border-top: 5px solid #2ecc71; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 15px;"></div>
       <span style="font-weight: bold; font-size: 20px; letter-spacing: 1px; color: #fff;">MOTOR DE VÍDEO ATIVO</span>
       <span id="timer-text" style="color: #2ecc71; font-size: 30px; font-weight: bold; margin: 10px 0;">15s</span>
       <small style="color: #ccc;">Gravando texturas em Full HD...</small>
    </div>
    
    <div id="init-loader" style="display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 30; flex-direction: column; justify-content: center; align-items: center; color: #333;">
       <div style="border: 4px solid #eee; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px;"></div>
       <span style="font-weight: bold; font-size: 16px;">Carregando Estúdio 3D...</span>
    </div>
  </div>

  <style> 
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } 
    button:hover { transform: translateY(-2px); filter: brightness(1.1); }
  </style>

  <div style="background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <span style="font-weight: bold; color: #444;">🎨 Sua Arte</span>
      <label for="upload-arte" style="background: #f39c12; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(243,156,18,0.3); transition: 0.2s;">📂 Selecionar Imagem</label>
      <input type="file" id="upload-arte" accept="image/*" style="display: none;">
    </div>
    <div style="height: 200px; background: #e9ecef; border-radius: 10px; overflow: hidden; border: 2px dashed #cbd5e0; display: flex; align-items: center; justify-content: center;">
      <img id="crop-target" src="https://via.placeholder.com/800x400?text=Aguardando+Arte..." style="max-width: 100%; max-height: 100%;">
    </div>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
      <button onclick="if(cropper) cropper.zoom(0.1)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff; font-weight: bold; color: #555;">🔍 +</button>
      <button onclick="if(cropper) cropper.zoom(-0.1)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff; font-weight: bold; color: #555;">🔎 -</button>
      <button onclick="if(cropper) cropper.rotate(90)" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff; font-weight: bold; color: #555;">🔄 Girar</button>
      <button onclick="if(cropper) cropper.reset()" style="padding: 8px 15px; cursor:pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff; color: #e74c3c; font-weight: bold;">⏮️ Reset</button>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px;">
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small style="font-weight:600; color:#555;">Interno/Alça</small><input type="color" id="color-handle" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none; margin-top:5px;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small style="font-weight:600; color:#555;">Cor Caneca</small><input type="color" id="color-body" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none; margin-top:5px;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small style="font-weight:600; color:#555;">Fundo Arte</small><input type="color" id="color-stamp" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none; margin-top:5px;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee;"><small style="font-weight:600; color:#555;">Base Apoio</small><input type="color" id="color-base" value="#e0e0e0" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none; margin-top:5px;"></div>
    <div style="background: #fff; padding: 10px; border-radius: 10px; border: 2px solid #3498db;"><small style="color: #3498db; font-weight: bold;">Cor Cenário</small><input type="color" id="color-bg" value="#ffffff" style="width: 100%; height: 35px; border: none; cursor: pointer; background: none; margin-top:5px;"></div>
  </div>

  <label style="background: #2c3e50; color: white; padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
      <input type="checkbox" id="metalic-toggle" style="width: 20px; height: 20px;"> ✨ ATIVAR EFEITO METALIZADO DE LUXO
  </label>
</div>

<script>
  const mv = document.querySelector('#cup-viewer');
  const initLoader = document.querySelector('#init-loader');
  const videoLoader = document.querySelector('#video-loader');
  const timerText = document.querySelector('#timer-text');
  let cropper = null;

  let currentBgColor = '#ffffff';
  let currentBgImage = null;
  let hasCustomBg = false;

  // Função conversora de cor protegida contra erros
  const toRGB = (hex) => {
    if (!hex || hex.length < 7) return [1, 1, 1, 1];
    return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255, 1];
  };

  // Trava de segurança: Só habilita o sistema quando o 3D estiver 100% carregado
  mv.addEventListener('load', () => {
    initLoader.style.display = 'none'; // Esconde a tela de carregamento
    
    // --- LIGAÇÃO DOS MATERIAIS ---
    document.querySelector('#color-handle').oninput = (e) => { 
        const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_interna")); 
        if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); 
    };
    
    document.querySelector('#color-body').oninput = (e) => { 
        const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_caneca")); 
        if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); 
    };
    
    document.querySelector('#color-stamp').oninput = (e) => { 
        const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_arte")); 
        if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); 
    };
    
    document.querySelector('#color-base').oninput = (e) => { 
        const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_base")); 
        if(m) m.pbrMetallicRoughness.setBaseColorFactor(toRGB(e.target.value)); 
    };

    document.querySelector('#metalic-toggle').onchange = (e) => {
        mv.model.materials.forEach(m => {
            if(!m.name.toLowerCase().includes("cor_base")) {
                m.pbrMetallicRoughness.setMetallicFactor(e.target.checked ? 1 : 0.1);
                m.pbrMetallicRoughness.setRoughnessFactor(e.target.checked ? 0.05 : 0.4);
            }
        });
    };
  });

  // --- LIGAÇÃO DO CENÁRIO ---
  document.querySelector('#color-bg').oninput = (e) => {
    hasCustomBg = true;
    currentBgColor = e.target.value;
    currentBgImage = null;
  };
  
  document.querySelector('#upload-fundo').onchange = (e) => {
    const file = e.target.files[0];
    if(file) { 
      hasCustomBg = true;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => { currentBgImage = img; };
      img.src = url;
    }
  };

  // --- CROPPER DA ARTE ---
  document.querySelector('#upload-arte').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = document.querySelector('#crop-target');
        img.src = event.target.result;
        if (cropper) cropper.destroy();
        cropper = new Cropper(img, { 
            viewMode: 1, 
            autoCropArea: 1, 
            crop() { 
                const canvas = cropper.getCroppedCanvas();
                if (canvas) applyTexture(canvas.toDataURL('image/png')); 
            } 
        });
      };
      reader.readAsDataURL(file);
    }
  };

  async function applyTexture(url) {
    try {
        const tex = await mv.createTexture(url);
        const m = mv.model.materials.find(mat => mat.name.toLowerCase().includes("cor_arte"));
        if (m && m.pbrMetallicRoughness.baseColorTexture) {
            m.pbrMetallicRoughness.baseColorTexture.setTexture(tex);
        }
    } catch (erro) {
        console.error("Aguardando carregamento da textura...", erro);
    }
  }

  // --- NÚCLEO MATEMÁTICO: MONTAGEM DA IMAGEM SEM AMASSAR ---
  function drawComposite(ctx, width, height, sourceCanvas) {
    // 1. Qualidade Máxima do Pincel
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.clearRect(0, 0, width, height);

    // 2. Desenha o Fundo (Cor ou Foto)
    if (hasCustomBg) {
      if (currentBgImage) {
        const scale = Math.max(width / currentBgImage.width, height / currentBgImage.height);
        const drawW = currentBgImage.width * scale;
        const drawH = currentBgImage.height * scale;
        ctx.drawImage(currentBgImage, (width - drawW) / 2, (height - drawH) / 2, drawW, drawH);
      } else {
        ctx.fillStyle = currentBgColor;
        ctx.fillRect(0, 0, width, height);
      }
    } else {
      const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width/2);
      gradient.addColorStop(0, "#ffffff");
      gradient.addColorStop(1, "#e0e0e0");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    if (!sourceCanvas) return;

    // 3. Centraliza a Caneca 3D matematicamente para não amassar no 16:9
    const srcW = sourceCanvas.width || sourceCanvas.clientWidth;
    const srcH = sourceCanvas.height || sourceCanvas.clientHeight;
    
    // Zoom suave para a caneca dominar o vídeo Full HD
    const scale3D = Math.min(width / srcW, height / srcH) * 1.0; 
    const drawW = srcW * scale3D;
    const drawH = srcH * scale3D;
    const dx = (width - drawW) / 2;
    const dy = (height - drawH) / 2;
    
    ctx.drawImage(sourceCanvas, dx, dy, drawW, drawH);
  }

  // --- MOTOR DE FOTO ULTRA HD (4K) ---
  document.querySelector('#btn-screenshot').onclick = async () => {
    // Força o modelo a atualizar texturas
    mv.jumpCameraToGoal();
    await new Promise(r => setTimeout(r, 150)); 

    const webglCanvas = mv.shadowRoot.querySelector('canvas');
    if (!webglCanvas) return;

    const photoCanvas = document.createElement('canvas');
    photoCanvas.width = 3840; // Resolução 4K Real
    photoCanvas.height = 2160;
    const ctx = photoCanvas.getContext('2d');
    
    drawComposite(ctx, photoCanvas.width, photoCanvas.height, webglCanvas);
    
    const a = document.createElement('a');
    a.href = photoCanvas.toDataURL('image/png', 1.0);
    a.download = 'mockup-foto-UltraHD.png';
    a.click();
  };

  // --- MOTOR DE VÍDEO 360° (FULL HD / 15 SEGUNDOS) ---
  document.querySelector('#btn-video').onclick = async () => {
    const webglCanvas = mv.shadowRoot.querySelector('canvas');
    if (!webglCanvas) {
        alert("Aguarde o modelo carregar completamente.");
        return;
    }

    videoLoader.style.display = 'flex';
    
    // Trava o ângulo inicial escolhido pelo usuário
    const orbit = mv.getCameraOrbit();
    const startTheta = orbit.theta * (180 / Math.PI); 
    const startPhi = orbit.phi;
    const startRadius = orbit.radius;

    const oldDecay = mv.interpolationDecay;
    mv.interpolationDecay = 0; // Trava a câmera para ter controle total

    // Cria o estúdio invisível Full HD
    const captureCanvas = document.createElement('canvas');
    captureCanvas.width = 1920; 
    captureCanvas.height = 1080;
    const ctx = captureCanvas.getContext('2d');

    // Configura a qualidade máxima de gravação
    const stream = captureCanvas.captureStream(30); // 30 FPS
    let options = { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 15000000 };
    if (!MediaRecorder.isTypeSupported(options.mimeType)) {
        options = { mimeType: 'video/webm', videoBitsPerSecond: 15000000 };
    }
    
    const recorder = new MediaRecorder(stream, options);
    const chunks = [];

    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: options.mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `mockup-360-FullHD-15s.webm`;
        a.click();
        URL.revokeObjectURL(url);
        
        videoLoader.style.display = 'none';
        
        // Devolve a caneca exatamente onde estava
        mv.interpolationDecay = oldDecay;
        mv.cameraOrbit = `${startTheta}deg ${startPhi}rad ${startRadius}m`;
        mv.jumpCameraToGoal();
    };

    recorder.start();

    // VARIÁVEIS DO GIRO
    const duration = 15000; // 15 Segundos cravados
    let startTime = null;

    // Loop de renderização suave e preciso
    function renderLoop(time) {
        if (!startTime) startTime = time;
        
        // O progresso depende do tempo real (não engasga nem acelera sozinho)
        let progress = (time - startTime) / duration;

        if (progress >= 1) {
            progress = 1;
            drawComposite(ctx, captureCanvas.width, captureCanvas.height, webglCanvas);
            recorder.stop();
            return;
        }

        // Gira 360 graus a partir da posição salva
        const currentAngle = startTheta + (progress * 360);
        mv.cameraOrbit = `${currentAngle}deg ${startPhi}rad ${startRadius}m`;
        mv.jumpCameraToGoal(); // Atualiza a posição da caneca

        // Copia a caneca colorida para o Canvas do Vídeo
        drawComposite(ctx, captureCanvas.width, captureCanvas.height, webglCanvas);
        
        // Atualiza a tela de carregamento pro cliente
        timerText.innerText = Math.max(0, Math.ceil(15 - (progress * 15))) + 's';

        requestAnimationFrame(renderLoop);
    }

    // Inicia o motor
    requestAnimationFrame(renderLoop);
  };
</script>
</body>
</html>
